name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell-tests:
    name: shellcheck + bats
    runs-on: macos-26 # arm64 (Apple Silicon) runner — required, no Intel fallback (L7)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install shellcheck + bats-core
        run: brew install shellcheck bats-core
      - name: shellcheck
        run: |
          find . -name '*.sh' -not -path './vendor/src/*' -print0 \
            | xargs -0 shellcheck -S warning
      - name: Install build dependencies
        run: |
          brew install llvm lld umoci xz util-linux
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
      - name: Install Rust target
        run: rustup target add aarch64-unknown-linux-musl
      - name: bats
        run: tests/run-all.sh

  rust-tests:
    name: cargo test (vendored crates)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build dependencies
        run: |
          brew install llvm lld xz util-linux
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
      - name: Run Rust tests
        run: ./vendor/src/anylinuxfs/run-rust-tests.sh

  swift-build:
    name: swift build (GUI)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test
